<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weekplanner Willekens-Lipkens</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Google API Client Library -->
    <script async defer src="https://apis.google.com/js/api.js" onload="gapiLoaded()"></script>
    <script async defer src="https://accounts.google.com/gsi/client" onload="gisLoaded()"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            -webkit-print-color-adjust: exact;
            print-color-adjust: exact;
        }

        /* Schermweergave van de "pagina's" */
        .page-container {
            width: 210mm;
            height: 290mm; 
            padding: 12mm 15mm; 
            background: white;
            position: relative;
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
            overflow: hidden;
        }

        @media screen {
            .page-preview {
                box-shadow: 0 20px 50px rgba(0, 0, 0, 0.1);
                margin-bottom: 3rem;
                border-radius: 4px;
                border: 1px solid #cbd5e1;
            }
        }

        /* Print-specifieke optimalisatie */
        @media print {
            .print-hidden { display: none !important; }
            body { background: white !important; padding: 0 !important; margin: 0 !important; }
            .page-container { 
                margin: 0 !important; 
                box-shadow: none !important;
                border-radius: 0 !important;
                page-break-after: always;
                border: none !important;
                height: 100vh;
            }
            @page {
                size: A4 portrait;
                margin: 0;
            }
        }

        textarea {
            resize: none;
            background: transparent;
            border: none;
            width: 100%;
            height: 100%;
            outline: none;
            font-size: 0.95rem; 
            line-height: 1.4;
            color: #0f172a;
            font-weight: 500;
        }

        .planner-table {
            border-collapse: collapse;
            table-layout: fixed;
            width: 100%;
            border: 3px solid #0f172a;
        }

        .planner-table td, .planner-table th {
            border: 2px solid #0f172a;
        }

        /* Rijhoogte strikt op 35mm */
        .day-row {
            height: 35mm;
        }

        .btn-action {
            transition: all 0.2s;
        }
        .btn-action:hover {
            transform: translateY(-1px);
            filter: brightness(1.1);
        }

        .manual-badge {
            background: #fef3c7;
            color: #92400e;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 10px;
            font-weight: 800;
            text-transform: uppercase;
        }
    </style>
</head>
<body class="bg-slate-200 p-8 flex flex-col items-center">

    <!-- Auth & Sync Controls -->
    <div id="auth-controls" class="w-[210mm] mb-6 flex flex-wrap justify-between items-center print-hidden bg-white p-4 rounded-xl shadow-lg border border-slate-300">
        <div class="flex items-center gap-3">
            <div class="bg-indigo-100 p-2 rounded-lg">
                <i data-lucide="calendar" class="text-indigo-600"></i>
            </div>
            <div>
                <h2 class="font-black text-slate-800 text-sm uppercase tracking-tight flex items-center gap-2">
                    Planner Beheer
                    <span id="manual-status-badge" class="manual-badge hidden">Handmatige Modus Actief</span>
                </h2>
                <p id="auth-subtext" class="text-[10px] text-slate-500 font-bold">Koppel je Google account of vul de vakken direct in.</p>
            </div>
        </div>
        
        <div class="flex gap-2">
            <button id="authorize_button" onclick="handleAuthClick()" class="btn-action bg-indigo-600 text-white px-5 py-2 rounded-full font-black text-xs shadow-md flex items-center gap-2">
                <i data-lucide="log-in" class="w-3 h-3"></i> Agenda Koppelen
            </button>
            <button id="manual_mode_button" onclick="activateManualMode()" class="btn-action bg-slate-100 text-slate-700 px-5 py-2 rounded-full font-black text-xs shadow-md flex items-center gap-2 border border-slate-200">
                <i data-lucide="edit" class="w-3 h-3"></i> Handmatige Modus
            </button>
            <button id="sync_button" onclick="listUpcomingEvents()" class="hidden btn-action bg-emerald-600 text-white px-5 py-2 rounded-full font-black text-xs shadow-md flex items-center gap-2">
                <i data-lucide="refresh-cw" class="w-3 h-3"></i> Verversen
            </button>
            <button onclick="window.print()" class="btn-action bg-slate-800 text-white px-5 py-2 rounded-full font-black text-xs shadow-md flex items-center gap-2">
                <i data-lucide="printer" class="w-3 h-3"></i> Print Plan
            </button>
        </div>
    </div>

    <!-- Pagina 1: Kids -->
    <div class="page-container page-preview" id="page1">
        <div class="border-b-[2px] border-indigo-600 pb-4 mb-8 flex justify-between items-end">
            <div>
                <div class="flex items-center gap-2 mb-1">
                    <span class="bg-indigo-600 text-white text-[10px] font-black px-2 py-0.5 rounded uppercase tracking-widest">Wekelijks overzicht</span>
                </div>
                <h1 class="text-2xl font-black text-slate-900 uppercase tracking-tighter leading-none">KIDS PLANNING</h1>
            </div>
            <div class="text-right">
                <p class="text-[11px] font-black text-indigo-600 uppercase tracking-[0.3em] mb-1">Willekens-Lipkens</p>
                <p class="text-1xl font-black text-slate-900 tabular-nums">23 — 29 MRT 2026</p>
            </div>
        </div>
        
        <table class="planner-table">
            <thead>
                <tr class="bg-slate-900 text-white text-[11px] tracking-[0.2em] uppercase font-black">
                    <th class="p-3 text-left w-32 border-r-2 border-white">🗓️ DAG</th>
                    <th class="p-3 text-center border-r-2 border-white">🧒 SUS</th>
                    <th class="p-3 text-center">👦 FONS</th>
                </tr>
            </thead>
            <tbody id="kids-table-body">
                <!-- Wordt ingevuld door JS -->
            </tbody>
        </table>
    </div>

    <!-- Pagina 2: Ouders & Notities -->
    <div class="page-container page-preview" id="page2">
        <div class="border-b-[2px] border-indigo-600 pb-4 mb-8 flex justify-between items-end">
            <div>
                <div class="flex items-center gap-2 mb-1">
                    <span class="bg-indigo-600 text-white text-[10px] font-black px-2 py-0.5 rounded uppercase tracking-widest">Organisatie</span>
                </div>
                <h1 class="text-2xl font-black text-slate-900 uppercase tracking-tighter leading-none">OUDERS & NOTITIES</h1>
            </div>
            <div class="text-right">
                <p class="text-[11px] font-black text-indigo-600 uppercase tracking-[0.3em] mb-1">Thuisadministratie</p>
                <p class="text-1xl font-black text-slate-900 tabular-nums">23 — 29 MRT 2026</p>
            </div>
        </div>
        
        <table class="planner-table">
            <thead>
                <tr class="bg-slate-900 text-white text-[11px] tracking-[0.2em] uppercase font-black">
                    <th class="p-3 text-left w-32 border-r-2 border-white">🗓️ DAG</th>
                    <th class="p-3 text-center border-r-2 border-white">🏠 JAN & ELS</th>
                    <th class="p-3 text-center">✏️ PEN-NOTITIES</th>
                </tr>
            </thead>
            <tbody id="parents-table-body">
                <!-- Wordt ingevuld door JS -->
            </tbody>
        </table>
    </div>

    <script>
        /* GOOGLE CALENDAR INTEGRATIE */
        const CLIENT_ID = '131444119475-delot5riuvvnqdh81o0qg5vk3lhvohi7.apps.googleusercontent.com'; // Vul hier je Client ID in
        const API_KEY = 'AIzaSyACod2hkwQKQIDiTZNIKfm5FEA-hWa5W_s';    // Vul hier je API Key in
        
        const DISCOVERY_DOC = 'https://www.googleapis.com/discovery/v1/apis/calendar/v3/rest';
        const SCOPES = 'https://www.googleapis.com/auth/calendar.readonly';

        let tokenClient;
        let gapiInited = false;
        let gisInited = false;

        let schedule = {
            "MA 23/03": { sus: "", fons: "", janEls: "", notes: "" },
            "DI 24/03": { sus: "", fons: "", janEls: "", notes: "" },
            "WO 25/03": { sus: "", fons: "", janEls: "", notes: "" },
            "DO 26/03": { sus: "", fons: "", janEls: "", notes: "" },
            "VR 27/03": { sus: "", fons: "", janEls: "", notes: "" },
            "ZA 28/03": { sus: "", fons: "", janEls: "", notes: "" },
            "ZO 29/03": { sus: "", fons: "", janEls: "", notes: "" }
        };

        function gapiLoaded() {
            if (!API_KEY) return;
            gapi.load('client', async () => {
                await gapi.client.init({ apiKey: API_KEY, discoveryDocs: [DISCOVERY_DOC] });
                gapiInited = true;
            });
        }

        function gisLoaded() {
            if (!CLIENT_ID) return;
            tokenClient = google.accounts.oauth2.initTokenClient({
                client_id: CLIENT_ID,
                scope: SCOPES,
                callback: '', 
            });
            gisInited = true;
        }

        function handleAuthClick() {
            if (!CLIENT_ID || !API_KEY) {
                alert("Let op: Je moet eerst de CLIENT_ID en API_KEY in de broncode plakken.");
                return;
            }
            
            tokenClient.callback = async (resp) => {
                if (resp.error !== undefined) throw (resp);
                document.getElementById('authorize_button').classList.add('hidden');
                document.getElementById('manual_mode_button').classList.add('hidden');
                document.getElementById('sync_button').classList.remove('hidden');
                await listUpcomingEvents();
            };

            tokenClient.requestAccessToken({prompt: 'consent'});
        }

        function activateManualMode() {
            document.getElementById('manual-status-badge').classList.remove('hidden');
            document.getElementById('authorize_button').classList.add('hidden');
            document.getElementById('manual_mode_button').classList.add('hidden');
            document.getElementById('auth-subtext').innerText = "Typ direct in de vakken hieronder om je week te plannen.";
        }

        async function listUpcomingEvents() {
            try {
                const calendarListResponse = await gapi.client.calendar.calendarList.list();
                const calendars = calendarListResponse.result.items;

                const startOfWeek = new Date('2026-03-23T00:00:00Z');
                const endOfWeek = new Date('2026-03-29T23:59:59Z');

                Object.keys(schedule).forEach(k => {
                    schedule[k] = { sus: "", fons: "", janEls: "", notes: schedule[k].notes };
                });

                for (const cal of calendars) {
                    const name = cal.summary.toLowerCase();
                    let targetKey = "";
                    if (name.includes("sus")) targetKey = "sus";
                    else if (name.includes("fons")) targetKey = "fons";
                    else if (name.includes("jan") || name.includes("els")) targetKey = "janEls";
                    else continue;

                    const response = await gapi.client.calendar.events.list({
                        calendarId: cal.id,
                        timeMin: startOfWeek.toISOString(),
                        timeMax: endOfWeek.toISOString(),
                        singleEvents: true,
                        orderBy: 'startTime',
                    });

                    const events = response.result.items;
                    events.forEach(event => {
                        const start = event.start.dateTime || event.start.date;
                        const startDate = new Date(start);
                        const dayIndex = (startDate.getDay() + 6) % 7; 
                        const dayKey = Object.keys(schedule)[dayIndex];

                        if (dayKey) {
                            const timeStr = event.start.dateTime ? new Date(event.start.dateTime).toLocaleTimeString('nl-NL', {hour: '2-digit', minute:'2-digit'}) : "";
                            schedule[dayKey][targetKey] += (schedule[dayKey][targetKey] ? "\n" : "") + (timeStr ? timeStr + " " : "") + event.summary;
                        }
                    });
                }
                renderTable();
            } catch (err) {
                console.error(err);
                alert("Fout bij ophalen agenda. Controleer of je domein geautoriseerd is in Google Cloud Console.");
            }
        }

        function renderTable() {
            const kidsBody = document.getElementById('kids-table-body');
            const parentsBody = document.getElementById('parents-table-body');
            kidsBody.innerHTML = '';
            parentsBody.innerHTML = '';

            Object.keys(schedule).forEach(day => {
                const [dag, datum] = day.split(' ');
                
                // Kids
                kidsBody.innerHTML += `
                    <tr class="day-row">
                        <td class="bg-slate-100 p-4 align-top border-r-2 border-slate-900">
                            <div class="font-black text-slate-900 text-3xl leading-none mb-1">${dag}</div>
                            <div class="text-[12px] text-indigo-600 font-black tracking-widest uppercase">${datum}</div>
                        </td>
                        <td class="p-4 align-top border-r-2 border-slate-900"><textarea oninput="schedule['${day}'].sus = this.value">${schedule[day].sus}</textarea></td>
                        <td class="p-4 align-top"><textarea oninput="schedule['${day}'].fons = this.value">${schedule[day].fons}</textarea></td>
                    </tr>
                `;

                // Parents
                parentsBody.innerHTML += `
                    <tr class="day-row">
                        <td class="bg-slate-100 p-4 align-top border-r-2 border-slate-900">
                            <div class="font-black text-slate-900 text-3xl leading-none mb-1">${dag}</div>
                            <div class="text-[12px] text-indigo-600 font-black tracking-widest uppercase">${datum}</div>
                        </td>
                        <td class="p-4 align-top border-r-2 border-slate-900"><textarea oninput="schedule['${day}'].janEls = this.value">${schedule[day].janEls}</textarea></td>
                        <td class="p-4 align-top"><textarea oninput="schedule['${day}'].notes = this.value" class="italic text-slate-400 font-semibold" placeholder="Handmatige notities...">${schedule[day].notes}</textarea></td>
                    </tr>
                `;
            });
            lucide.createIcons();
        }

        renderTable();
    </script>
</body>
</html>
